<!DOCTYPE html>
<html>
<head>
    <title>Warehouse RL Routing</title>
    <link rel="stylesheet" href="/frontend/style.css">
</head>
<body>

<h1>Warehouse Routing Comparison</h1>

<div class="controls">
    <label>Grid Size:</label>
    <select id="gridSize">
        <option value="15">15 x 15</option>
        <option value="10">10 x 10</option>
    </select>
    <br><br>
    
    <button id="startBtn">Start Position</button>
    <button id="goalBtn">Goal Position</button>
    <button id="obstacleBtn">Place Obstacles</button>
    <button id="clearBtn">Clear Grid</button>
    <button id="runBtn">Run Comparison</button>
</div>

<div id="grid"></div>

<h2>Results</h2>
<div id="results">
    <h3 id="rlSteps"></h3>
    <h3 id="dijkstraSteps"></h3>
</div>

<script src="/frontend/script.js"></script>
</body>
</html>
